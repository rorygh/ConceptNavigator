<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnowledgeAtlas</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f6f8fa;
      --panel:   #ffffff;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --accent:  #2563eb;
      --pre:     #059669;
      --post:    #d97706;
      --shadow:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    }

    html, body { height: 100%; background: var(--bg); overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

    canvas { position: fixed; inset: 0; cursor: default; display: block; }

    /* ── Logo ── */
    #logo {
      position: fixed; top: 20px; left: 22px; z-index: 10;
      font-size: 14px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); pointer-events: none; user-select: none;
      display: flex; align-items: center; gap: 6px;
    }
    #logo em { color: var(--accent); font-style: normal; }

    /* ── Hint pill ── */
    #hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: var(--muted);
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 10;
      white-space: nowrap;
    }

    /* ── Search bar ── */
    #search-wrap {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: min(520px, calc(100vw - 32px)); z-index: 20;
    }
    #search-inner {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 13px; padding: 11px 16px;
      box-shadow: var(--shadow-lg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10), var(--shadow-lg);
    }
    #search-icon { color: var(--muted); flex-shrink: 0; width: 17px; height: 17px; }
    #search-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 15px; color: var(--text); font-family: inherit;
    }
    #search-input::placeholder { color: var(--muted); }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; z-index: 50; max-width: 220px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 13px; font-size: 13px;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      box-shadow: var(--shadow);
    }
    .tt-id    { font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
                color: var(--accent); margin-bottom: 3px; }
    .tt-title { font-weight: 600; line-height: 1.3; color: var(--text); }
    .tt-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Detail panel ── */
    #detail {
      position: fixed; right: 0; top: 0; bottom: 0; width: 340px;
      background: var(--panel); border-left: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; z-index: 40;
    }
    #detail.open { transform: translateX(0); }

    #detail-close {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; cursor: pointer; color: var(--muted);
      width: 28px; height: 28px; border-radius: 6px; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #detail-close:hover { background: var(--border); }

    .d-header { padding: 24px 22px 0; }
    .d-id     { font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
                text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .d-title  { font-size: 17px; font-weight: 600; line-height: 1.35; color: var(--text); }
    .d-meta   { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .d-body   { padding: 16px 22px 80px; }
    .d-desc   { font-size: 13.5px; line-height: 1.72; color: #334155; margin-top: 14px; }

    .d-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .d-label  { font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
                text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .chip {
      display: inline-block; background: #eff6ff; color: var(--accent);
      border: 1px solid #dbeafe; border-radius: 6px;
      padding: 3px 9px; font-size: 12px; margin: 2px;
      cursor: pointer; transition: background 0.12s;
    }
    .chip:hover { background: #dbeafe; }
    .chip.pre  { background: #ecfdf5; color: var(--pre);  border-color: #a7f3d0; }
    .chip.pre:hover  { background: #d1fae5; }
    .d-none   { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<div id="logo">
  <svg width="18" height="18" viewBox="0 0 32 32" aria-hidden="true">
    <line x1="16" y1="9" x2="7"  y2="23" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="9" x2="25" y2="23" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="23" x2="25" y2="23" stroke="#cbd5e1" stroke-width="1"   stroke-linecap="round"/>
    <circle cx="16" cy="9"  r="4.5" fill="#2563eb"/>
    <circle cx="7"  cy="23" r="3"   fill="#059669"/>
    <circle cx="25" cy="23" r="3"   fill="#7c3aed"/>
  </svg>
  Knowledge<em>Atlas</em>
</div>
<div id="hint"></div>
<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-id"    id="tt-id"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta"  id="tt-meta"></div>
</div>

<div id="detail">
  <button id="detail-close">✕</button>
  <div class="d-header">
    <div class="d-id"    id="d-id"></div>
    <div class="d-title" id="d-title"></div>
    <div class="d-meta"  id="d-meta"></div>
  </div>
  <div class="d-body">
    <p class="d-desc" id="d-desc"></p>
    <div class="d-section">
      <div class="d-label">Prerequisites</div>
      <div id="d-prereqs"></div>
    </div>
    <div class="d-section">
      <div class="d-label">Related</div>
      <div id="d-related"></div>
    </div>
  </div>
</div>

<div id="search-wrap">
  <div id="search-inner">
    <svg id="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3" stroke-linecap="round"/>
    </svg>
    <input id="search-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="What do you want to learn?" />
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// CANVAS + DIMENSIONS
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (VIEW === 'GALAXY') startGalaxy(); });


// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

let VIEW     = 'GALAXY';   // GALAXY | SEARCH | SELECTED
let nodes    = [];
let edges    = [];
let nodeById = {};
let courseDetails = {};

let selected     = null;
let hovered      = null;
let searchScores = {};
let prereqDepths = new Map();   // id → depth (0=selected, 1=direct prereq, …)
let selSuccIds   = new Set();
let selRelEdges  = [];

let searchQuery     = '';
let searchQueryNode = null;     // virtual X node pinned at center in SEARCH view
let searchEdges     = [];       // virtual edges: queryNode → matched courses

let T   = d3.zoomIdentity;
let sim = null;
let qt  = null;


// ═══════════════════════════════════════════════════════════════
// COLOR SYSTEM
// ═══════════════════════════════════════════════════════════════

const deptScale = d3.scaleOrdinal(d3.schemeTableau10);

const COLOR_MODES = {
  department: n => deptScale(n.dept),
  level:      n => ({ U: '#3b82f6', G: '#8b5cf6' }[n.level] ?? '#94a3b8'),
  units:      n => d3.interpolateYlOrRd(Math.min(n.units || 9, 24) / 24),
};
let colorMode = 'department';

function baseColor(n) {
  return COLOR_MODES[colorMode]?.(n) ?? '#94a3b8';
}

// Desaturated, mildly lightened version of the dept color for background nodes
function ghostColor(n) {
  const c = d3.hsl(baseColor(n));
  c.s = c.s * 0.3;
  c.l = Math.min(c.l + 0.12, 0.82);
  return c + '';
}

function nodeColor(n) {
  if (VIEW === 'SELECTED') {
    const d = prereqDepths.get(n.id);
    if (d === 0) return '#2563eb';
    if (d !== undefined) return PREREQ_COLORS[Math.min(d - 1, PREREQ_COLORS.length - 1)];
    if (selSuccIds.has(n.id)) return '#d97706';
    return ghostColor(n);
  }
  if (VIEW === 'SEARCH') {
    return searchScores[n.id] > 0 ? baseColor(n) : ghostColor(n);
  }
  return baseColor(n);
}


// ═══════════════════════════════════════════════════════════════
// ZOOM / PAN
// ═══════════════════════════════════════════════════════════════

const zoomBehavior = d3.zoom()
  .scaleExtent([0.04, 14])
  .on('zoom', ev => { T = ev.transform; draw(); });

d3.select(canvas).call(zoomBehavior).on('dblclick.zoom', null);


// ═══════════════════════════════════════════════════════════════
// SIMULATION HELPERS
// ═══════════════════════════════════════════════════════════════

function stopSim() { if (sim) { sim.stop(); sim = null; } }

function updateQt() {
  qt = d3.quadtree().x(d => d.x).y(d => d.y).addAll(nodes);
}

function tick() { updateQt(); draw(); }

function resetZoom() {
  d3.select(canvas).transition().duration(650)
    .call(zoomBehavior.transform, d3.zoomIdentity);
}

// BFS collecting all transitive prerequisites (unlimited depth by default)
function buildPrereqDepths(rootId, maxDepth = Infinity) {
  const depths = new Map();
  const queue  = [[rootId, 0]];
  while (queue.length) {
    const [id, d] = queue.shift();
    if (depths.has(id)) continue;
    depths.set(id, d);
    if (d < maxDepth) {
      edges.forEach(e => {
        if (e.target.id === id && !depths.has(e.source.id))
          queue.push([e.source.id, d + 1]);
      });
    }
  }
  return depths;
}


// ═══════════════════════════════════════════════════════════════
// VIEW: GALAXY
// ═══════════════════════════════════════════════════════════════

function deptCentroids() {
  const depts = [...new Set(nodes.map(n => n.dept))].sort();
  const cx = W / 2, cy = H / 2, r = Math.min(W, H) * 0.3;
  const out = {};
  depts.forEach((d, i) => {
    const a = (i / depts.length) * 2 * Math.PI - Math.PI / 2;
    out[d] = { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  });
  return out;
}

function startGalaxy() {
  VIEW = 'GALAXY';
  selected = null; searchScores = {};
  prereqDepths = new Map(); selSuccIds = new Set(); selRelEdges = [];
  searchQuery = ''; searchQueryNode = null; searchEdges = [];
  nodes.forEach(n => { n.fx = null; n.fy = null; });

  const c = deptCentroids();
  stopSim();
  sim = d3.forceSimulation(nodes)
    .force('x',      d3.forceX(n => c[n.dept]?.x ?? W/2).strength(0.07))
    .force('y',      d3.forceY(n => c[n.dept]?.y ?? H/2).strength(0.07))
    .force('charge', d3.forceManyBody().strength(-2).distanceMax(80))
    .force('coll',   d3.forceCollide(3.5).strength(0.6))
    .alphaDecay(0.025)
    .on('tick', tick);

  setHint(null);
  document.getElementById('detail').classList.remove('open');
}


// ═══════════════════════════════════════════════════════════════
// VIEW: SEARCH — X marker at centre, matched courses radiate out
// ═══════════════════════════════════════════════════════════════

function startSearch(results, query) {
  VIEW = 'SEARCH';
  selected = null;
  prereqDepths = new Map(); selSuccIds = new Set(); selRelEdges = [];

  searchQuery = query;
  searchScores = {};
  results.forEach((c, i) => { searchScores[c.id] = 1 - i / results.length; });

  // Virtual query node pinned at canvas centre
  searchQueryNode = { id: '__query__', x: W/2, y: H/2, fx: W/2, fy: H/2 };

  // Virtual edges from query node to each matched course
  searchEdges = results
    .map(c => ({ source: searchQueryNode, target: nodeById[c.id] }))
    .filter(e => e.target);

  nodes.forEach(n => { n.fx = null; n.fy = null; });
  resetZoom();

  stopSim();
  sim = d3.forceSimulation(nodes)
    .force('radial', d3.forceRadial(n => {
      const s = searchScores[n.id] ?? 0;
      // Matched: 50–250px from center by score. Background: ~60% of shorter screen dim.
      return s > 0 ? (1 - s) * 200 + 50 : Math.min(W, H) * 0.30;
    }, W/2, H/2).strength(n => searchScores[n.id] > 0 ? 0.85 : 0.14))
    .force('charge', d3.forceManyBody()
      .strength(n => searchScores[n.id] > 0 ? -80 : -2))
    .force('coll',   d3.forceCollide(n => searchScores[n.id] > 0 ? 42 : 4)
      .strength(0.8))
    .alphaDecay(0.016)
    .on('tick', tick);

  setHint(`${results.length} courses matched — click to explore`);
}


// ═══════════════════════════════════════════════════════════════
// VIEW: SELECTED — focal course + full prereq chain + successors
// ═══════════════════════════════════════════════════════════════

function startSelected(id) {
  VIEW = 'SELECTED';
  searchQuery = ''; searchQueryNode = null; searchEdges = [];
  selected = nodeById[id];
  if (!selected) return;

  // Full transitive prereq chain (no depth limit)
  prereqDepths = buildPrereqDepths(id);
  selSuccIds   = new Set(edges.filter(e => e.source.id === id).map(e => e.target.id));

  const relIds = new Set([...prereqDepths.keys(), ...selSuccIds]);
  selRelEdges  = edges.filter(e => relIds.has(e.source.id) && relIds.has(e.target.id));

  // Scatter incoming prereq/succ nodes so each selection visibly re-settles.
  // Background nodes stay put; only the nodes that need to move get displaced.
  nodes.forEach(n => {
    n.fx = null; n.fy = null;
    const d = prereqDepths.get(n.id);
    if (d !== undefined && d > 0) {
      // Place near the target x column but with randomised y
      const tx = W / 2 - Math.min(d * 200, W * 0.44);
      n.x = tx + (Math.random() - 0.5) * 140;
      n.y = H / 2 + (Math.random() - 0.5) * H * 0.65;
    } else if (selSuccIds.has(n.id)) {
      n.x = W / 2 + 200 + Math.random() * 120;
      n.y = H / 2 + (Math.random() - 0.5) * H * 0.55;
    }
  });

  // Snap selected node to centre immediately (visible on first frame)
  selected.x  = W / 2;
  selected.y  = H / 2;
  selected.fx = W / 2;
  selected.fy = H / 2;
  resetZoom();

  stopSim();
  sim = d3.forceSimulation(nodes)
    .force('x', d3.forceX(n => {
      const d = prereqDepths.get(n.id);
      if (d === 0) return W / 2;
      // Prereqs spread left; cap so deep chains don't vanish off-screen
      if (d !== undefined) return W / 2 - Math.min(d * 200, W * 0.44);
      if (selSuccIds.has(n.id)) return W / 2 + 240;
      return n.x;
    }).strength(n =>
      prereqDepths.has(n.id) || selSuccIds.has(n.id) ? (n === selected ? 1 : 0.45) : 0))
    .force('y', d3.forceY(H / 2).strength(n =>
      prereqDepths.has(n.id) || selSuccIds.has(n.id) ? 0.18 : 0))
    .force('charge', d3.forceManyBody().strength(n => {
      const d = prereqDepths.get(n.id);
      if (d === 0) return -200;
      if (d === 1) return -100;
      if (d !== undefined) return -55;
      if (selSuccIds.has(n.id)) return -100;
      return -2;
    }))
    .force('coll', d3.forceCollide(n => {
      const d = prereqDepths.get(n.id);
      if (d === 0) return 52;
      if (d === 1) return 42;
      if (d !== undefined) return 13;
      if (selSuccIds.has(n.id)) return 40;
      return 4;
    }))
    // Gently pull background nodes toward screen centre so they stay visible
    .force('bg-x', d3.forceX(W / 2).strength(n =>
      prereqDepths.has(n.id) || selSuccIds.has(n.id) ? 0 : 0.006))
    .force('bg-y', d3.forceY(H / 2).strength(n =>
      prereqDepths.has(n.id) || selSuccIds.has(n.id) ? 0 : 0.006))
    .alphaDecay(0.02)
    .on('tick', tick);

  const total = prereqDepths.size - 1;
  setHint(`${selected.id}  ·  ${total} prerequisite${total !== 1 ? 's' : ''}  ·  enables ${selSuccIds.size}`);

  // Asynchronously fetch semantic similarity and add a gentle clustering force
  const snapId = id;
  fetch(`/api/similar/${id}`).then(r => r.json()).then(({ similar }) => {
    if (VIEW !== 'SELECTED' || selected?.id !== snapId || !sim) return;
    const simMap = new Map(similar.map(({ id: sid, score }) => [sid, score]));
    const relSet = new Set([...prereqDepths.keys(), ...selSuccIds]);
    const simLinks = [];
    simMap.forEach((score, sid) => {
      if (relSet.has(sid) && sid !== snapId && nodeById[sid])
        simLinks.push({ source: nodeById[sid], target: selected, score });
    });
    if (simLinks.length) {
      sim.force('similarity', d3.forceLink(simLinks)
        .strength(e => e.score * 0.12)
        .distance(e => (1 - e.score) * 200 + 50));
      sim.alpha(0.25).restart();
    }
  }).catch(() => {});
}


// ═══════════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════════

const PREREQ_COLORS = ['#059669', '#0891b2', '#7c3aed'];

function nodeR(n) {
  if (VIEW === 'SELECTED') {
    const d = prereqDepths.get(n.id);
    if (d === 0) return 14;
    if (d === 1) return 10;
    if (d !== undefined) return 7;
    if (selSuccIds.has(n.id)) return 9;
    return 3;
  }
  if (VIEW === 'SEARCH') {
    const s = searchScores[n.id] ?? 0;
    return s > 0 ? 6 + s * 8 : 3;
  }
  return 3;
}

function drawEdges() {
  // SELECTED: prereq/succ relationship edges
  if (selected && selRelEdges.length) {
    ctx.save();
    ctx.lineCap = 'round';
    selRelEdges.forEach(e => {
      const s = e.source, t = e.target;
      if (!isFinite(s.x) || !isFinite(t.x)) return;
      let color = '#cbd5e1', lw = 1, alpha = 0.45;
      if (hovered) {
        if (t === hovered) { color = '#059669'; lw = 2; alpha = 0.9; }
        else if (s === hovered) { color = '#d97706'; lw = 2; alpha = 0.9; }
      }
      if (s === selected || t === selected) { lw = Math.max(lw, 1.5); alpha = Math.max(alpha, 0.55); }
      ctx.beginPath();
      ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = color;
      ctx.lineWidth   = lw / T.k;
      ctx.globalAlpha = alpha;
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // SEARCH: query node → matched course edges
  if (VIEW === 'SEARCH' && searchQueryNode && searchEdges.length) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 1 / T.k;
    searchEdges.forEach(e => {
      const t = e.target;
      if (!isFinite(t.x)) return;
      const score = searchScores[t.id] ?? 0;
      ctx.globalAlpha = 0.07 + score * 0.25;
      ctx.beginPath();
      ctx.moveTo(searchQueryNode.x, searchQueryNode.y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawNodes() {
  // Batch circles by (color, radius) to minimise ctx.fill() calls
  const groups = new Map();
  nodes.forEach(n => {
    if (!isFinite(n.x) || !isFinite(n.y)) return;
    const r = nodeR(n), c = nodeColor(n);
    const key = c + '|' + r;
    if (!groups.has(key)) groups.set(key, { c, r, list: [] });
    groups.get(key).list.push(n);
  });
  groups.forEach(({ c, r, list }) => {
    ctx.fillStyle = c;
    ctx.beginPath();
    list.forEach(n => { ctx.moveTo(n.x + r, n.y); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); });
    ctx.fill();
  });

  // Ring for hovered + selected
  [hovered, selected].forEach((n, i) => {
    if (!n || !isFinite(n.x)) return;
    const r = nodeR(n) + (i === 1 ? 4 : 2.5);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth   = (i === 1 ? 2 : 1.5) / T.k;
    ctx.stroke();
  });

  // X marker for the search query node
  if (VIEW === 'SEARCH' && searchQueryNode) {
    const { x, y } = searchQueryNode;
    const sz = 10;
    ctx.save();
    // Soft halo circle
    ctx.beginPath();
    ctx.arc(x, y, sz * 1.8, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(37,99,235,0.12)';
    ctx.lineWidth = 1.5 / T.k;
    ctx.stroke();
    // X cross
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth   = 2.5 / T.k;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(x - sz, y - sz); ctx.lineTo(x + sz, y + sz);
    ctx.moveTo(x + sz, y - sz); ctx.lineTo(x - sz, y + sz);
    ctx.stroke();
    ctx.restore();
  }
}

function halo(text, x, y) {
  ctx.save();
  ctx.lineJoin    = 'round';
  ctx.lineWidth   = 3 / T.k;
  ctx.strokeStyle = 'rgba(255,255,255,0.92)';
  ctx.strokeText(text, x, y);
  ctx.restore();
}

// Word-wrap text to maxPx wide, up to maxLines lines.
// Font must be set before calling (used for measureText).
function wrapText(text, maxPx, maxLines = 2) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxPx && cur) {
      if (lines.length + 1 >= maxLines) {
        lines.push(cur + ' …');
        return lines;
      }
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawLabels() {
  const toLabel = [];

  if (VIEW === 'SELECTED') {
    nodes.forEach(n => {
      const d     = prereqDepths.get(n.id);
      const isSucc = selSuccIds.has(n.id);
      // Label depth 0 (selected), 1 (direct prereq), 2 (prereq-of-prereq), successors
      // Depth 3+ are shown as colored nodes but unlabeled (tooltip on hover)
      if (d === 0 || d === 1 || d === 2 || isSucc) {
        toLabel.push({ n, big: d === 0, labelDepth: d ?? -1 });
      }
    });
  } else if (VIEW === 'SEARCH') {
    nodes.forEach(n => {
      if (searchScores[n.id] > 0) toLabel.push({ n, big: false, labelDepth: 0 });
    });
  } else if (hovered && T.k > 2) {
    toLabel.push({ n: hovered, big: false, labelDepth: 0 });
  }

  if (!toLabel.length && !(VIEW === 'SEARCH' && searchQueryNode)) return;

  ctx.textAlign = 'center';
  const LINE_H = 13;

  toLabel.forEach(({ n, big, labelDepth }) => {
    const r        = nodeR(n);
    const fontSize = big ? 12 : 10;
    const idSize   = big ? 10 : 8.5;
    const idY      = n.y - r - 3;

    // Course ID above circle (always shown for labeled nodes)
    ctx.font = `700 ${idSize}px -apple-system, sans-serif`;
    halo(n.id, n.x, idY);
    ctx.fillStyle = '#2563eb';
    ctx.fillText(n.id, n.x, idY);

    // Title below circle:
    //   depth 0 (selected) → 2 lines, 160px wide
    //   depth 1, successor  → 1 line,  120px wide
    //   depth 2             → ID only (no title)
    //   SEARCH matches      → 1 line,  130px wide
    const showTitle = big || labelDepth === 1 || labelDepth === -1 || VIEW === 'SEARCH';
    if (showTitle) {
      const maxLines = big ? 2 : 1;
      const wrapPx   = big ? 160 : (VIEW === 'SEARCH' ? 130 : 120);
      ctx.font = `500 ${fontSize}px -apple-system, sans-serif`;
      const lines = wrapText(n.title, wrapPx, maxLines);
      lines.forEach((line, i) => {
        const y = n.y + r + fontSize + 2 + i * LINE_H;
        halo(line, n.x, y);
        ctx.fillStyle = '#0f172a';
        ctx.fillText(line, n.x, y);
      });
    }
  });

  // Query label below the X marker
  if (VIEW === 'SEARCH' && searchQueryNode && searchQuery) {
    ctx.font      = `600 11px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    const { x, y } = searchQueryNode;
    const ly = y + 24;
    halo(searchQuery, x, ly);
    ctx.fillStyle = '#2563eb';
    ctx.fillText(searchQuery, x, ly);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(T.x, T.y);
  ctx.scale(T.k, T.k);
  drawEdges();
  drawNodes();
  drawLabels();
  ctx.restore();
}


// ═══════════════════════════════════════════════════════════════
// MOUSE
// ═══════════════════════════════════════════════════════════════

function simXY(ev) { return T.invert([ev.clientX, ev.clientY]); }

canvas.addEventListener('mousemove', ev => {
  if (!qt) return;
  const [mx, my] = simXY(ev);
  const found = qt.find(mx, my, 50 / T.k);
  if (found !== hovered) { hovered = found; draw(); }
  found ? showTip(ev, found) : hideTip();
});

canvas.addEventListener('click', ev => {
  if (!qt) return;
  const [mx, my] = simXY(ev);
  const n = qt.find(mx, my, 20 / T.k);
  if (n) { openDetail(n.id); startSelected(n.id); }
});

canvas.addEventListener('mouseleave', () => { hovered = null; hideTip(); draw(); });


// ═══════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════

const tipEl = document.getElementById('tooltip');

const DEPT_NAMES = {
  '1':'Civil Eng.','2':'Mech. Eng.','3':'Materials','4':'Architecture',
  '5':'Chemistry','6':'EECS','7':'Biology','8':'Physics',
  '9':'Brain & Cog. Sci.','10':'Chem. Eng.','11':'Urban Studies',
  '12':'Earth & Planetary Sci.','14':'Economics','15':'Sloan',
  '16':'AeroAstro','17':'Political Sci.','18':'Mathematics',
  '20':'Biological Eng.','21A':'Anthropology','22':'Nuclear Sci.',
  '24':'Philosophy','HST':'Health Sci. & Tech.','STS':'Science & Society',
  'CMS':'Comparative Media','MAS':'Media Arts & Sci.',
};

function showTip(ev, n) {
  let rel = '';
  if (VIEW === 'SELECTED' && selected) {
    const d = prereqDepths.get(n.id);
    if (d === 0)              rel = ' · selected';
    else if (d === 1)         rel = ' · direct prerequisite';
    else if (d !== undefined) rel = ` · prereq (depth ${d})`;
    else if (selSuccIds.has(n.id)) rel = ' · enabled by this';
  } else if (VIEW === 'SEARCH' && searchScores[n.id] > 0) {
    rel = ` · ${Math.round(searchScores[n.id] * 100)}% match`;
  }
  const dept = DEPT_NAMES[n.dept] ? `${n.dept} — ${DEPT_NAMES[n.dept]}` : `Dept. ${n.dept}`;
  document.getElementById('tt-id').textContent    = n.id;
  document.getElementById('tt-title').textContent = n.title;
  document.getElementById('tt-meta').textContent  = `${n.units} units · ${dept}${rel}`;
  tipEl.style.opacity = '1';
  tipEl.style.left = Math.min(ev.clientX + 14, W - 230) + 'px';
  tipEl.style.top  = Math.min(ev.clientY - 10, H - 90)  + 'px';
}
function hideTip() { tipEl.style.opacity = '0'; }


// ═══════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════

async function openDetail(id) {
  const n = nodeById[id];
  if (n) {
    document.getElementById('d-id').textContent    = n.id;
    document.getElementById('d-title').textContent = n.title;
    document.getElementById('d-meta').textContent  = `${n.units} units · ${n.level || '—'}`;
    document.getElementById('d-desc').textContent  = 'Loading…';
    document.getElementById('d-prereqs').innerHTML = '';
    document.getElementById('d-related').innerHTML = '';
  }
  document.getElementById('detail').classList.add('open');

  let c = courseDetails[id];
  if (!c) {
    c = await fetch(`/api/course/${id}`).then(r => r.json());
    courseDetails[id] = c;
  }

  document.getElementById('d-meta').textContent = [
    c.units && `${c.units} units`,
    c.level,
    c.instructors?.length ? c.instructors.join(', ') : null,
  ].filter(Boolean).join(' · ');

  document.getElementById('d-desc').textContent = c.description;

  function chips(ids, cls) {
    if (!ids?.length) return '<span class="d-none">None listed</span>';
    return ids.filter(id => nodeById[id]).map(pid =>
      `<span class="chip ${cls}" data-id="${pid}">${pid}</span>`
    ).join('') || '<span class="d-none">None in catalog</span>';
  }

  document.getElementById('d-prereqs').innerHTML = chips(c.prereqs_flat, 'pre');
  document.getElementById('d-related').innerHTML = chips(c.related_subjects, '');

  document.querySelectorAll('.chip[data-id]').forEach(el => {
    el.onclick = () => { openDetail(el.dataset.id); startSelected(el.dataset.id); };
  });

  if (c.url) {
    const existing = document.getElementById('d-url-link');
    if (existing) existing.remove();
    const link = document.createElement('a');
    link.id = 'd-url-link';
    link.href = c.url; link.target = '_blank';
    link.textContent = 'View on MIT website →';
    link.style.cssText = 'display:block;margin-top:16px;font-size:13px;color:#2563eb;text-decoration:none;';
    document.querySelector('.d-body').appendChild(link);
  }
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
  startGalaxy();
});


// ═══════════════════════════════════════════════════════════════
// SEARCH INPUT
// ═══════════════════════════════════════════════════════════════

const searchInput = document.getElementById('search-input');

async function doSearch(q) {
  searchInput.blur();
  const { courses } = await fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: q, n: 10 }),
  }).then(r => r.json());
  startSearch(courses, q);
}

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && searchInput.value.trim()) doSearch(searchInput.value.trim());
  if (e.key === 'Escape') { searchInput.value = ''; startGalaxy(); }
});


// ═══════════════════════════════════════════════════════════════
// HINT PILL
// ═══════════════════════════════════════════════════════════════

const hintEl = document.getElementById('hint');
function setHint(t) { hintEl.textContent = t ?? ''; hintEl.style.opacity = t ? '1' : '0'; }


// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  const [coursesData, graphData] = await Promise.all([
    fetch('/api/courses').then(r => r.json()),
    fetch('/api/graph').then(r => r.json()),
  ]);

  nodes = coursesData.map(c => ({
    id: c.id, title: c.title, units: c.units, level: c.level, dept: c.dept,
    x: W/2 + (Math.random() - 0.5) * W * 0.7,
    y: H/2 + (Math.random() - 0.5) * H * 0.7,
  }));
  nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  edges = graphData.edges
    .map(e => ({ source: nodeById[e.source], target: nodeById[e.target] }))
    .filter(e => e.source && e.target);

  updateQt();
  startGalaxy();
  searchInput.focus();
}

init();
</script>
