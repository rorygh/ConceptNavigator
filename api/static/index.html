<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConceptAtlas</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f6f8fa;
      --panel:   #ffffff;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --accent:  #2563eb;
      --pre:     #059669;
      --post:    #d97706;
      --shadow:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    }

    html, body { height: 100%; background: var(--bg); overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

    canvas { position: fixed; inset: 0; cursor: default; display: block; }

    /* ── Logo ── */
    #logo {
      position: fixed; top: 20px; left: 22px; z-index: 10;
      font-size: 14px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); pointer-events: none; user-select: none;
      display: flex; align-items: center; gap: 6px;
    }
    #logo em { color: var(--accent); font-style: normal; }

    /* ── Hint pill ── */
    #hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: var(--muted);
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 10;
      white-space: nowrap;
    }

    /* ── Search bar ── */
    #search-wrap {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: min(520px, calc(100vw - 32px)); z-index: 20;
    }
    #search-inner {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 13px; padding: 11px 16px;
      box-shadow: var(--shadow-lg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10), var(--shadow-lg);
    }
    #search-icon { color: var(--muted); flex-shrink: 0; width: 17px; height: 17px; }
    #search-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 15px; color: var(--text); font-family: inherit;
    }
    #search-input::placeholder { color: var(--muted); }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; z-index: 50; max-width: 220px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 13px; font-size: 13px;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
      box-shadow: var(--shadow);
    }
    .tt-id    { font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
                color: var(--accent); margin-bottom: 3px; }
    .tt-title { font-weight: 600; line-height: 1.3; color: var(--text); }
    .tt-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Detail panel ── */
    #detail {
      position: fixed; right: 0; top: 0; bottom: 0; width: 340px;
      background: var(--panel); border-left: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; z-index: 40;
    }
    #detail.open { transform: translateX(0); }

    #detail-close {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; cursor: pointer; color: var(--muted);
      width: 28px; height: 28px; border-radius: 6px; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #detail-close:hover { background: var(--border); }

    .d-header { padding: 24px 22px 0; }
    .d-id     { font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
                text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .d-title  { font-size: 17px; font-weight: 600; line-height: 1.35; color: var(--text); }
    .d-meta   { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .d-body   { padding: 16px 22px 80px; }
    .d-desc   { font-size: 13.5px; line-height: 1.72; color: #334155; margin-top: 14px; }

    .d-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .d-label  { font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
                text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .chip {
      display: inline-block; background: #eff6ff; color: var(--accent);
      border: 1px solid #dbeafe; border-radius: 6px;
      padding: 3px 9px; font-size: 12px; margin: 2px;
      cursor: pointer; transition: background 0.12s;
    }
    .chip:hover { background: #dbeafe; }
    .chip.pre  { background: #ecfdf5; color: var(--pre);  border-color: #a7f3d0; }
    .chip.pre:hover  { background: #d1fae5; }
    .d-none   { font-size: 13px; color: var(--muted); }

    /* ── Intent tags (LLM-extracted topics, shown below search bar) ── */
    #intent-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 7px 6px 0;
    }
    #intent-tags:empty { padding: 0; }
    .intent-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      color: #1d4ed8; background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 2px 9px;
      pointer-events: none; user-select: none;
    }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      color: #1d4ed8; background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 2px 6px 2px 9px;
      user-select: none;
    }
    .fc-x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: #bfdbfe; color: #1e40af;
      font-size: 11px; line-height: 1; cursor: pointer;
      transition: background 0.12s; flex-shrink: 0;
    }
    .fc-x:hover { background: #93c5fd; }
    .add-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px;
      font-size: 14px; font-weight: 400; line-height: 1;
      color: var(--accent); background: transparent;
      border: 1.5px dashed #93c5fd; border-radius: 50%;
      cursor: pointer; user-select: none; flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
    }
    .add-chip:hover { background: #eff6ff; border-color: var(--accent); }
    #filter-panel {
      display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
      padding: 7px 6px 2px;
    }
    #filter-panel[hidden] { display: none; }
    #fp-type {
      font-family: inherit; font-size: 11.5px;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 6px; background: var(--bg); color: var(--text);
      cursor: pointer; outline: none; flex-shrink: 0;
    }
    #fp-value {
      font-family: inherit; font-size: 11.5px;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; width: 90px; background: var(--bg); color: var(--text);
      outline: none;
    }
    #fp-value:focus { border-color: var(--accent); }
    #fp-add {
      font-family: inherit; font-size: 11px; font-weight: 600;
      padding: 3px 10px; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; cursor: pointer; flex-shrink: 0;
    }
    #fp-add:hover { background: #1d4ed8; }
    #fp-cancel {
      font-family: inherit; font-size: 13px;
      width: 20px; height: 20px; padding: 0; line-height: 1;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; border-radius: 4px;
    }
    #fp-cancel:hover { color: var(--text); }
  </style>
</head>
<body>

<div id="logo">
  <svg width="18" height="18" viewBox="0 0 32 32" aria-hidden="true">
    <line x1="16" y1="9" x2="7"  y2="23" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="9" x2="25" y2="23" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="23" x2="25" y2="23" stroke="#cbd5e1" stroke-width="1"   stroke-linecap="round"/>
    <circle cx="16" cy="9"  r="4.5" fill="#2563eb"/>
    <circle cx="7"  cy="23" r="3"   fill="#059669"/>
    <circle cx="25" cy="23" r="3"   fill="#7c3aed"/>
  </svg>
  Concept<em>Atlas</em>
</div>
<div id="hint"></div>
<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-id"    id="tt-id"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta"  id="tt-meta"></div>
</div>

<div id="detail">
  <button id="detail-close">✕</button>
  <div class="d-header">
    <div class="d-id"    id="d-id"></div>
    <div class="d-title" id="d-title"></div>
    <div class="d-meta"  id="d-meta"></div>
  </div>
  <div class="d-body">
    <p class="d-desc" id="d-desc"></p>
    <div class="d-section">
      <div class="d-label">Prerequisites</div>
      <div id="d-prereqs"></div>
    </div>
    <div class="d-section">
      <div class="d-label">Related</div>
      <div id="d-related"></div>
    </div>
  </div>
</div>

<div id="search-wrap">
  <div id="search-inner">
    <svg id="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3" stroke-linecap="round"/>
    </svg>
    <input id="search-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="What do you want to learn?" />
  </div>
  <div id="filter-panel" hidden>
    <select id="fp-type">
      <option value="">filter type…</option>
      <option value="level_G">Level: Grad</option>
      <option value="level_U">Level: Undergrad</option>
      <option value="dept">Department (e.g. 6, 18)</option>
      <option value="max_units">Max units</option>
      <option value="instructor">By instructor</option>
      <option value="has_prereqs_true">Has prerequisites</option>
      <option value="has_prereqs_false">No prerequisites</option>
      <option value="exclude">Exclude keyword</option>
    </select>
    <input id="fp-value" placeholder="value…" hidden />
    <button id="fp-add">Add</button>
    <button id="fp-cancel">✕</button>
  </div>
  <div id="intent-tags"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
